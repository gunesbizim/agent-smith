name: SonarQube

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # shallow clones disable blame

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Coverage for SonarCloud
      - name: Run tests with coverage
        run: npx vitest run --coverage --coverage.reporter=lcov 2>&1 || npx vitest run --coverage.reporter=lcov 2>&1 || true

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.organization=gunesbizim
            -Dsonar.projectKey=gunesbizim_agent-smith
            -Dsonar.sources=src
            -Dsonar.tests=src/__tests__
            -Dsonar.typescript.tsconfigPath=tsconfig.json
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.coverage.exclusions=src/__tests__/**

      - name: SonarCloud Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v4
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
