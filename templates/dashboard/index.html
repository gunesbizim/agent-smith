<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Agent Smith — Agent Call Dashboard</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2330; --border: #30363d;
    --fg: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
    --opus: #d2a8ff; --sonnet: #7ee787; --run: #58a6ff; --done: #3fb950; --fail: #f85149; --queued: #8b949e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); background: var(--panel); position: sticky; top: 0; z-index: 2; }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; }
  .live { margin-left: auto; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--fail); }
  .dot.on { background: var(--done); box-shadow: 0 0 6px var(--done); }
  .totals { display: flex; flex-wrap: wrap; gap: 18px; padding: 10px 18px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 13px; }
  .totals b { color: var(--fg); }
  .filters { padding: 10px 18px; display: flex; gap: 8px; align-items: center; }
  .filters button { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 12px; cursor: pointer; font: inherit; font-size: 12px; }
  .filters button.active { border-color: var(--accent); color: var(--accent); }
  main { padding: 0 18px 40px; max-width: 100%; }
  details.run { border: 1px solid var(--border); border-radius: 8px; margin: 12px 0; background: var(--panel); overflow: hidden; }
  summary { cursor: pointer; padding: 10px 14px; list-style: none; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  summary::-webkit-details-marker { display: none; }
  .badge { font-size: 11px; padding: 1px 7px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); }
  .badge.engine { color: var(--accent); border-color: var(--accent); }
  .badge.interactive { color: var(--opus); border-color: var(--opus); }
  .st { font-size: 12px; }
  .st.running { color: var(--run); } .st.done { color: var(--done); } .st.failed { color: var(--fail); } .st.queued { color: var(--queued); }
  .meta { color: var(--muted); font-size: 12px; margin-left: auto; }
  .phase { border-top: 1px solid var(--border); }
  .phase > .phead { padding: 8px 14px 8px 26px; color: var(--muted); display: flex; gap: 10px; align-items: center; }
  .scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 640px; }
  th, td { text-align: left; padding: 5px 10px; border-top: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; }
  td.prompt { white-space: normal; color: var(--muted); max-width: 420px; }
  .model { font-weight: 600; }
  .model.opus { color: var(--opus); } .model.sonnet { color: var(--sonnet); }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .empty { color: var(--muted); padding: 40px 0; text-align: center; }
  .tools { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
  .tool { font-size: 10px; padding: 0 5px; border-radius: 8px; background: var(--panel2); color: var(--muted); border: 1px solid var(--border); white-space: nowrap; }
  .tool.mcp { color: var(--opus); border-color: var(--opus); font-weight: 600; }
  .mcpbadge { font-size: 11px; padding: 1px 7px; border-radius: 10px; border: 1px solid var(--opus); color: var(--opus); margin-left: 8px; }
  .errbadge { font-size: 11px; padding: 1px 7px; border-radius: 10px; border: 1px solid var(--fail); color: var(--fail); margin-left: 8px; }
  .toolfilters input { background: var(--panel2); color: var(--fg); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; font: inherit; font-size: 12px; min-width: 220px; }
  .toolfilters button.active { border-color: var(--accent); color: var(--accent); }
  details.toolpanel { margin: 0 18px 12px; }
  .tool.err { color: var(--fail); border-color: var(--fail); }
  td.err { color: var(--fail); }
  .toolname.mcp { color: var(--opus); font-weight: 600; }
  .runtools { padding: 8px 14px 8px 26px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
  .runtools .lbl { color: var(--muted); font-size: 11px; margin-right: 4px; }
</style>
</head>
<body>
  <header>
    <h1>⚒ Agent Smith — Agent Call Dashboard</h1>
    <span class="live"><span class="dot" id="dot"></span><span id="livetext">connecting…</span></span>
  </header>
  <div class="totals" id="totals"></div>
  <div class="filters">
    <span style="color:var(--muted);font-size:12px">runs:</span>
    <button data-f="all" class="active">all</button>
    <button data-f="engine">engine</button>
    <button data-f="interactive">interactive</button>
  </div>
  <div class="filters toolfilters">
    <span style="color:var(--muted);font-size:12px">tools:</span>
    <input id="toolq" type="search" placeholder="filter tool name…" autocomplete="off" />
    <button id="mcpOnly" data-t="mcp">MCP only</button>
    <button id="errOnly" data-t="err">errors only</button>
  </div>
  <details class="run toolpanel" id="toolpanel">
    <summary>
      <strong>⚙ Tool calls</strong>
      <span class="meta" id="toolpanelmeta"></span>
    </summary>
    <div class="scroll"><table id="tooltable"><thead><tr>
      <th>tool</th><th>kind</th><th class="num">calls</th><th class="num">errors</th><th class="num">success</th>
    </tr></thead><tbody id="tooltablebody"></tbody></table></div>
  </details>
  <main id="runs"><div class="empty">No runs yet. Start one with <code>agent-smith run &lt;ticket|task&gt;</code>.</div></main>

<script>
  var state = { runs: [], filter: "all", toolFilter: { q: "", mcpOnly: false, errorsOnly: false } };
  // Remembers which runs the user manually expanded/collapsed, keyed by runId, so a periodic
  // SSE re-render (which rebuilds the DOM) does not reset the open/closed state of each row.
  var openState = {};

  function fmtTokens(n){ return (n||0).toLocaleString(); }
  function fmtCost(c){ return c == null ? "—" : "$" + Number(c).toFixed(4); }
  function fmtDur(ms){ if(ms==null) return "—"; if(ms<1000) return ms+"ms"; var s=Math.round(ms/1000); return s<60? s+"s" : Math.floor(s/60)+"m"+(s%60)+"s"; }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g, function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
  function modelClass(m){ m=(m||"").toLowerCase(); return m.indexOf("opus")>=0?"opus":m.indexOf("sonnet")>=0?"sonnet":""; }

  function isMcpName(name){ return String(name).indexOf("mcp__")===0; }

  // True when a tool name passes the active tool filter (name search + MCP-only + errors-only).
  function toolPasses(name, errCount){
    var tf = state.toolFilter;
    if(tf.q && String(name).toLowerCase().indexOf(tf.q.toLowerCase())<0) return false;
    if(tf.mcpOnly && !isMcpName(name)) return false;
    if(tf.errorsOnly && !(errCount>0)) return false;
    return true;
  }

  // Combine each run's toolCalls.byTool/byToolErrors into one aggregate, filtered.
  function aggregateTools(runs){
    var byTool={}, byErr={};
    runs.forEach(function(r){
      var tc=r.toolCalls||{}; var bt=tc.byTool||{}; var be=tc.byToolErrors||{};
      Object.keys(bt).forEach(function(k){ byTool[k]=(byTool[k]||0)+bt[k]; });
      Object.keys(be).forEach(function(k){ byErr[k]=(byErr[k]||0)+be[k]; });
    });
    var rows=Object.keys(byTool).filter(function(k){ return toolPasses(k, byErr[k]||0); })
      .map(function(k){ return { tool:k, calls:byTool[k], errors:byErr[k]||0, mcp:isMcpName(k) }; });
    rows.sort(function(a,b){ return b.calls-a.calls; });
    return rows;
  }

  function renderToolTable(rows){
    var body=document.getElementById("tooltablebody");
    var meta=document.getElementById("toolpanelmeta");
    if(!rows.length){
      body.innerHTML='<tr><td colspan="5" class="prompt">no tool calls match the filter</td></tr>';
      meta.textContent='0 tools';
      return;
    }
    var totCalls=0, totErr=0, mcp=0;
    body.innerHTML=rows.map(function(t){
      totCalls+=t.calls; totErr+=t.errors; if(t.mcp) mcp+=t.calls;
      var ok=t.calls-t.errors; var pct=t.calls? Math.round(100*ok/t.calls):0;
      return '<tr><td class="toolname '+(t.mcp?"mcp":"")+'">'+esc(t.tool)+'</td>'+
        '<td>'+(t.mcp?"MCP":"built-in")+'</td>'+
        '<td class="num">'+t.calls+'</td>'+
        '<td class="num '+(t.errors?"err":"")+'">'+(t.errors||"—")+'</td>'+
        '<td class="num">'+pct+'%</td></tr>';
    }).join("");
    meta.textContent=rows.length+' tools · '+totCalls+' calls · '+mcp+' MCP · '+totErr+' err';
  }

  function render(){
    var runs = state.runs.filter(function(r){ return state.filter==="all" || r.origin===state.filter; });
    var t = runs.reduce(function(a,r){
      a.tokens+=r.totals.tokens; a.cost+=r.totals.costUsd; a.calls+=r.totals.callCount;
      var tc=r.toolCalls||{}; a.tools+=tc.total||0; a.mcp+=tc.mcpCount||0; a.err+=tc.errorCount||0;
      return a;
    }, {tokens:0,cost:0,calls:0,tools:0,mcp:0,err:0});
    document.getElementById("totals").innerHTML =
      "agent calls <b>"+t.calls+"</b>" +
      " &nbsp;|&nbsp; tool calls <b>"+t.tools+"</b> ("+t.mcp+" MCP · "+t.err+" err)" +
      " &nbsp;|&nbsp; tokens <b>"+fmtTokens(t.tokens)+"</b>" +
      " &nbsp;|&nbsp; cost <b>"+(t.cost?("$"+t.cost.toFixed(2)):"—")+"</b>" + " &nbsp;|&nbsp; runs <b>"+runs.length+"</b>";

    renderToolTable(aggregateTools(runs));

    var main = document.getElementById("runs");
    if(!runs.length){ main.innerHTML = '<div class="empty">No runs yet.</div>'; return; }
    main.innerHTML = runs.map(renderRun).join("");
  }

  function renderRun(r){
    var phases = r.phases.map(renderPhase).join("");
    // User choice (openState) wins; otherwise running runs default to expanded.
    var isOpen = (r.runId in openState) ? openState[r.runId] : (r.status==="running");
    var open = isOpen ? " open" : "";
    return '<details class="run" data-run-id="'+esc(r.runId)+'"'+open+'><summary>'+
      '<span class="badge '+r.origin+'">'+r.origin+'</span>'+
      '<strong>'+esc(r.ticketId||r.task||r.runId)+'</strong>'+
      '<span class="st '+r.status+'">'+r.status+'</span>'+
      '<span class="meta">'+r.totals.callCount+' calls · '+fmtTokens(r.totals.tokens)+' tok · '+(r.totals.costUsd?("$"+r.totals.costUsd.toFixed(2)):"—")+' · '+fmtDur(r.totals.wallClockMs)+'</span>'+ mcpBadge(r) + errBadge(r) +
      '</summary>'+ renderRunTools(r) + (phases || '<div class="phase"><div class="phead">no calls yet</div></div>') +'</details>';
  }

  function errBadge(r){ var n=(r.toolCalls&&r.toolCalls.errorCount)||0; return n>0 ? '<span class="errbadge">'+n+' err</span>' : ''; }

  // Per-run tool-call chips from the aggregated tool_call events, honoring the tool filter.
  function renderRunTools(r){
    var tc=r.toolCalls||{}; var bt=tc.byTool||{}; var be=tc.byToolErrors||{};
    var keys=Object.keys(bt).filter(function(k){ return toolPasses(k, be[k]||0); });
    if(!keys.length) return "";
    keys.sort(function(a,b){ return bt[b]-bt[a]; });
    var chips=keys.map(function(k){
      var err=be[k]||0;
      var cls="tool"+(isMcpName(k)?" mcp":"")+(err?" err":"");
      return '<span class="'+cls+'">'+esc(k)+' '+bt[k]+(err?(' ✗'+err):'')+'</span>';
    });
    return '<div class="runtools"><span class="lbl">tool calls:</span>'+chips.join("")+'</div>';
  }

  function mcpCount(r){
    var n=0;
    r.phases.forEach(function(p){ p.calls.forEach(function(c){
      if(c.tools) Object.keys(c.tools).forEach(function(k){ if(k.indexOf("mcp__")===0) n+=c.tools[k]; });
    }); });
    return n;
  }
  function mcpBadge(r){ var n=mcpCount(r); return n>0 ? '<span class="mcpbadge">MCP '+n+'</span>' : ''; }

  function renderTools(tools){
    if(!tools) return "";
    var keys=Object.keys(tools); if(!keys.length) return "";
    keys.sort(function(a,b){ return tools[b]-tools[a]; });
    var parts=keys.map(function(k){
      var cls = k.indexOf("mcp__")===0 ? "tool mcp" : "tool";
      return '<span class="'+cls+'">'+esc(k)+' '+tools[k]+'</span>';
    });
    return '<div class="tools">'+parts.join("")+'</div>';
  }

  function renderPhase(p){
    var rows = p.calls.map(function(c){
      return '<tr><td class="model '+modelClass(c.model)+'">'+esc(c.model)+'</td>'+
        '<td class="st '+c.status+'">'+c.status+'</td>'+
        '<td class="prompt">'+esc(c.promptSummary)+renderTools(c.tools)+'</td>'+
        '<td class="num">'+fmtTokens(c.tokens)+'</td>'+
        '<td class="num">'+fmtCost(c.costUsd)+'</td>'+
        '<td class="num">'+fmtDur(c.durationMs)+'</td></tr>';
    }).join("");
    return '<div class="phase"><div class="phead"><strong>'+esc(p.name)+'</strong>'+
      '<span class="st '+p.status+'">'+p.status+'</span>'+
      '<span class="meta">'+p.calls.length+' calls · '+fmtTokens(p.totals.tokens)+' tok</span></div>'+
      '<div class="scroll"><table><thead><tr><th>model</th><th>status</th><th>prompt</th><th class="num">tokens</th><th class="num">cost</th><th class="num">dur</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }

  // Run-origin filter (all / engine / interactive).
  Array.prototype.forEach.call(document.querySelectorAll(".filters button[data-f]"), function(b){
    b.addEventListener("click", function(){
      state.filter = b.getAttribute("data-f");
      Array.prototype.forEach.call(document.querySelectorAll(".filters button[data-f]"), function(x){ x.classList.remove("active"); });
      b.classList.add("active");
      render();
    });
  });

  // Tool-call filters: name search + MCP-only + errors-only toggles.
  document.getElementById("toolq").addEventListener("input", function(e){ state.toolFilter.q = e.target.value; render(); });
  document.getElementById("mcpOnly").addEventListener("click", function(){
    state.toolFilter.mcpOnly = !state.toolFilter.mcpOnly; this.classList.toggle("active", state.toolFilter.mcpOnly); render();
  });
  document.getElementById("errOnly").addEventListener("click", function(){
    state.toolFilter.errorsOnly = !state.toolFilter.errorsOnly; this.classList.toggle("active", state.toolFilter.errorsOnly); render();
  });

  // Persist manual expand/collapse across re-renders. `toggle` does not bubble, so listen in the
  // capture phase on the stable #runs container (its innerHTML is rebuilt, but the element itself isn't).
  document.getElementById("runs").addEventListener("toggle", function(e){
    var d = e.target;
    if(d && d.tagName==="DETAILS" && d.dataset && d.dataset.runId){ openState[d.dataset.runId] = d.open; }
  }, true);

  function setLive(on){ document.getElementById("dot").className = "dot"+(on?" on":""); document.getElementById("livetext").textContent = on?"live":"disconnected"; }

  function connect(){
    var es = new EventSource("/api/events");
    var apply = function(e){ try { var snap = JSON.parse(e.data); state.runs = snap.runs || []; render(); setLive(true); } catch(_){} };
    es.addEventListener("snapshot", apply);
    es.addEventListener("update", apply);
    es.onopen = function(){ setLive(true); };
    es.onerror = function(){ setLive(false); }; // browser auto-reconnects
  }
  connect();
</script>
</body>
</html>
