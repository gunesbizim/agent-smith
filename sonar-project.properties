# SonarCloud project configuration — agent-smith
sonar.organization=gunesbizim
sonar.projectKey=gunesbizim_agent-smith
sonar.projectName=Agent Smith
sonar.projectVersion=0.2.2

# Source
sonar.sources=src
sonar.tests=src/__tests__
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Exclusions (test files are handled via sonar.tests, not excluded from analysis)
sonar.exclusions=dist/**,node_modules/**
sonar.cpd.exclusions=src/__tests__/**

# Test file inclusions
sonar.test.inclusions=src/__tests__/**
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality gate — Sonar way (built-in)
sonar.qualitygate.wait=true

# Issue exclusions
sonar.issue.ignore.multicriteria=e1,e2,e3
sonar.issue.ignore.multicriteria.e1.ruleKey=typescript:S1134
sonar.issue.ignore.multicriteria.e1.resourceKey=**/templates/**
# S5443 in tests — paths are mock args passed to mocked functions, not real FS operations
sonar.issue.ignore.multicriteria.e2.ruleKey=typescript:S5443
sonar.issue.ignore.multicriteria.e2.resourceKey=src/__tests__/**
# S4036 in mcp-installer — intentionally resolves the `claude` CLI via PATH (the
# user's installed Claude Code binary); args are passed as an array, no shell.
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S4036
sonar.issue.ignore.multicriteria.e3.resourceKey=src/install/mcp-installer.ts

# Links
sonar.links.homepage=https://github.com/gunesbizim/agent-smith
sonar.links.ci=https://github.com/gunesbizim/agent-smith/actions
sonar.links.issue=https://github.com/gunesbizim/agent-smith/issues
sonar.links.scm=https://github.com/gunesbizim/agent-smith
