# SonarQube Community Edition — local instance for agent-smith static analysis
# Startup: docker compose -f sonarqube/docker-compose.yml up -d
# First login: admin / admin → change password immediately
# UI: http://localhost:9002
# Token: generate at http://localhost:9000/account/security → set as SONAR_TOKEN env var

services:
  sonarqube:
    image: sonarqube:community
    container_name: agent-smith-sonarqube
    hostname: sonarqube
    ports:
      - "9002:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    depends_on:
      sonarqube-db:
        condition: service_healthy
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    mem_limit: 2g

  sonarqube-db:
    image: postgres:16-alpine
    container_name: agent-smith-sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db_data:
