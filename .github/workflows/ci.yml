name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript type-check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            vitest.config.ts
            src/__tests__/

  sonarcloud:
    name: SonarCloud Scan
    runs-on: ubuntu-24.04
    needs: [test]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Tests with coverage
        run: npx vitest run --coverage --coverage.reporter=lcov 2>&1 || true
      # Dependabot PRs run without access to repo Actions secrets, so SONAR_TOKEN is empty and the
      # scan/gate cannot authenticate. Skip those two steps for the bot (the job still builds + runs
      # tests with coverage, so dep bumps are still validated) — this keeps the check green instead
      # of failing on a missing token. Full Sonar still runs on all human PRs.
      - name: SonarCloud Scan
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: sonarsource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=gunesbizim
            -Dsonar.projectKey=gunesbizim_agent-smith
            -Dsonar.sources=src
            -Dsonar.tests=src/__tests__
            -Dsonar.typescript.tsconfigPath=tsconfig.json
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
      - name: SonarCloud Quality Gate
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: sonarsource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  build:
    name: Build
    runs-on: ubuntu-24.04
    needs: [typecheck, test]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Verify dist output
        run: |
          if [ ! -f dist/index.js ]; then
            echo "dist/index.js missing — build failed"
            exit 1
          fi
          echo "Build OK — $(find dist -name '*.js' | wc -l) JS files"
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 7

